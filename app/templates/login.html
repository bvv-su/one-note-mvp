<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}

  <form method="post" action="/login">
    <div>
      <label>Username:</label><br/>
      <input type="text" name="username" />
    </div>
    <br/>
    <div>
      <label>Password:</label><br/>
      <input type="password" name="password" />
    </div>
    <br/>
    <button type="submit">Login</button>
  </form>
</body>
</html>
