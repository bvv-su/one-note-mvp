<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Login</title>
</head>
<body>
  <h2>Login</h2>

  {% if error %}
    <p style="color:red">{{ error }}</p>
  {% endif %}

  <form method="post">
    <label>
      Username:<br>
      <input type="text" name="username" required>
    </label>
    <br><br>

    <label>
      Password:<br>
      <input type="password" name="password" required>
    </label>
    <br><br>

    <button type="submit">Login</button>
  </form>
</body>
</html>
