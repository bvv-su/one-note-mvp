<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>My note</title>
</head>
<body>
  <h1>My note</h1>

  <form method="post" action="/note">
    <textarea name="content" rows="12" cols="80">{{ content }}</textarea>
    <br/><br/>
    <button type="submit">Save</button>
  </form>

  <hr/>

  <!-- Кнопка выгрузки CSV -->
  <form method="get" action="/export/note.csv">
    <button type="submit">Download CSV</button>
  </form>

  <br/>

  <form method="post" action="/logout">
    <button type="submit">Logout</button>
  </form>
</body>
</html>
